services:
  # Python API service
  - type: web
    name: pavouci-api
    env: python
    buildCommand: pip install -r pavouci_api/requirements.txt
    startCommand: uvicorn pavouci_api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pavouci-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: pavouci-db
    databaseName: pavouci
    user: pavouci_user
    plan: free # Můžete změnit na placený, pokud potřebujete persistentní data déle než 90 dní
